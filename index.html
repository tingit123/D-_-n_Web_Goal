<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexiCal - Lịch Vạn Niên & Mục Tiêu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-20">
        <!-- Logo -->
        <div class="p-5 flex items-center space-x-3 border-b border-gray-100">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="fa-solid fa-calendar-days text-xl"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">FlexiCal</h1>
        </div>

        <!-- Nav tabs -->
        <nav class="flex-1 p-4 space-y-2">
            <button data-action="switch-tab" data-tab="calendar" id="tab-calendar"
                class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-colors bg-indigo-50 text-indigo-700 font-semibold">
                <i class="fa-regular fa-clock text-lg"></i>
                <span>Không gian Lịch</span>
            </button>
            <button data-action="switch-tab" data-tab="goals" id="tab-goals"
                class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-colors text-gray-600 hover:bg-gray-100">
                <i class="fa-solid fa-bullseye text-lg"></i>
                <span>Mục tiêu & Tiến độ</span>
            </button>
        </nav>

        <!-- User info -->
        <div class="p-4 border-t border-gray-200">
            <div class="bg-blue-50 p-4 rounded-xl mb-4">
                <h3 class="text-sm font-semibold text-blue-800 mb-1">Cấu hình cá nhân</h3>
                <p class="text-xs text-blue-600 mb-2">Giờ làm việc: 08:00 - 17:00</p>
                <button onclick="alert('Tính năng đang phát triển')"
                    class="text-xs bg-white text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200 w-full font-medium hover:bg-blue-50 transition-colors">
                    <i class="fa-solid fa-gear mr-1"></i> Cài đặt
                </button>
            </div>
            <div class="flex items-center space-x-3 px-2">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-500 to-indigo-500 flex items-center justify-center text-white font-bold shadow-sm">
                    UX
                </div>
                <div>
                    <p class="text-sm font-semibold">Nhà Sáng Chế</p>
                    <p class="text-xs text-gray-500">Gói Pro</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white">

        <!-- HEADER -->
        <header
            class="h-16 border-b border-gray-200 flex items-center justify-between px-6 shrink-0 bg-white z-10">
            <div class="flex items-center space-x-4">
                <h2 id="header-title" class="text-xl font-semibold text-gray-800">Lịch làm việc</h2>

                <!-- View Switcher (Day / Week / Month + Prev/Next) -->
                <div id="view-switcher" class="hidden flex items-center space-x-2">
                    <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200">
                        <button data-action="switch-view" data-view="day" id="view-day"
                            class="px-3 py-1 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900">Ngày</button>
                        <button data-action="switch-view" data-view="week" id="view-week"
                            class="px-3 py-1 text-sm font-medium rounded-md bg-white shadow-sm text-indigo-600">Tuần</button>
                        <button data-action="switch-view" data-view="month" id="view-month"
                            class="px-3 py-1 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900">Tháng</button>
                    </div>
                    <div class="flex items-center space-x-1 ml-4 bg-gray-50 rounded-lg border border-gray-200 p-1">
                        <button data-action="prev-date"
                            class="px-2 py-1 text-gray-500 hover:text-indigo-600 rounded">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <button data-action="today-date"
                            class="px-3 py-1 text-sm font-medium text-gray-700 hover:text-indigo-600">Hôm nay</button>
                        <button data-action="next-date"
                            class="px-2 py-1 text-gray-500 hover:text-indigo-600 rounded">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="flex space-x-3">
                <button data-action="smart-reschedule"
                    class="flex items-center space-x-2 bg-amber-100 text-amber-700 hover:bg-amber-200 px-4 py-2 rounded-lg font-medium transition-colors shadow-sm text-sm">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Bận đột xuất (Dời lịch)</span>
                </button>
                <button data-action="open-modal" data-modal="task"
                    class="flex items-center space-x-2 bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-2 rounded-lg font-medium transition-colors shadow-sm text-sm">
                    <i class="fa-solid fa-plus"></i>
                    <span>Tạo việc mới</span>
                </button>
            </div>
        </header>

        <!-- KHU VỰC NỘI DUNG CHÍNH (JS render vào đây) -->
        <div id="app-content" class="flex-1 overflow-auto bg-gray-50 p-6 relative scroll-smooth"></div>
    </main>

    <!-- TOAST THÔNG BÁO -->
    <div id="toast-container"
        class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col items-center space-y-2 pointer-events-none">
    </div>

    <!-- ===== MODALS ===== -->

    <!-- 1. Modal hỏi thăm khi task quá hạn chưa xong -->
    <div id="overdue-modal"
        class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-[420px] shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="overdue-modal-content">
            <div class="p-8 text-center space-y-4 relative">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-400 to-orange-500"></div>
                <div
                    class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-2 border-4 border-white shadow-sm">
                    <i class="fa-regular fa-face-frown-open text-3xl"></i>
                </div>
                <h3 class="font-bold text-2xl text-gray-800">Công việc ổn cả chứ?</h3>
                <p class="text-gray-600">Đã hết thời gian dành cho việc <br />
                    <strong id="overdue-task-name" class="text-indigo-600 text-lg"></strong><br />
                    Bạn đã hoàn thành xong chưa?
                </p>
            </div>
            <div class="px-6 py-5 bg-gray-50 flex justify-center space-x-4 border-t border-gray-100">
                <button data-action="overdue-missed"
                    class="px-5 py-2.5 bg-white border-2 border-gray-200 text-gray-700 font-medium hover:bg-gray-100 hover:border-gray-300 rounded-xl transition-all">
                    Vẫn chưa xong
                </button>
                <button data-action="overdue-completed"
                    class="px-5 py-2.5 bg-green-500 text-white font-medium hover:bg-green-600 rounded-xl shadow-md shadow-green-500/30 transition-all flex items-center">
                    <i class="fa-solid fa-check mr-2"></i>Đã hoàn thành
                </button>
            </div>
        </div>
    </div>

    <!-- 2. Modal tạo Task -->
    <div id="task-modal"
        class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-[480px] shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="task-modal-content">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-lg">Thêm Công việc mới (Task)</h3>
                <button data-action="close-modal" data-modal="task" class="text-gray-400 hover:text-gray-700">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Tên công việc <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="task-title" placeholder="VD: Đọc sách"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium text-gray-800">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Chi tiết (Làm cái gì?)</label>
                    <textarea id="task-desc" rows="2"
                        placeholder="VD: Đọc sách Đắc Nhân Tâm từ trang 10 đến 30..."
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm text-gray-600 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gắn vào Mục tiêu</label>
                    <select id="task-goal"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500 text-sm">
                        <option value="">-- Không gắn mục tiêu --</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Thời gian bắt đầu <span class="text-red-500">*</span>
                        </label>
                        <input type="datetime-local" id="task-start"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 outline-none focus:border-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Thời gian kết thúc <span class="text-red-500">*</span>
                        </label>
                        <input type="datetime-local" id="task-end"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 outline-none focus:border-indigo-500 text-sm">
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end space-x-3 rounded-b-2xl">
                <button data-action="close-modal" data-modal="task"
                    class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-200 rounded-lg">Hủy</button>
                <button data-action="save-real-task"
                    class="px-5 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-sm">
                    Lưu Công việc
                </button>
            </div>
        </div>
    </div>

    <!-- 3. Modal tạo Goal -->
    <div id="goal-modal"
        class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-[450px] shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="goal-modal-content">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-lg">Tạo Mục tiêu lớn (Goal)</h3>
                <button data-action="close-modal" data-modal="goal" class="text-gray-400 hover:text-gray-700">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Tên mục tiêu <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="goal-title" placeholder="VD: Đạt IELTS 7.0"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Loại Mục tiêu</label>
                    <select id="goal-type"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500">
                        <option value="Weekly">Hàng Tuần (Weekly)</option>
                        <option value="Monthly" selected>Hàng Tháng (Monthly)</option>
                        <option value="Yearly">Hàng Năm (Yearly)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ngày bắt đầu</label>
                        <input type="date" id="goal-start"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 outline-none focus:border-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ngày kết thúc</label>
                        <input type="date" id="goal-end"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 outline-none focus:border-indigo-500 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Màu sắc đánh dấu</label>
                    <select id="goal-color"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500">
                        <option value="blue">Xanh dương</option>
                        <option value="green">Xanh lá</option>
                        <option value="red">Đỏ</option>
                        <option value="amber">Vàng/Cam</option>
                    </select>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end space-x-3 rounded-b-2xl">
                <button data-action="close-modal" data-modal="goal"
                    class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-200 rounded-lg">Hủy</button>
                <button data-action="save-real-goal"
                    class="px-5 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-sm">
                    Lưu Mục tiêu
                </button>
            </div>
        </div>
    </div>

    <!-- ===== ENTRY POINT (ES Modules) ===== -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
